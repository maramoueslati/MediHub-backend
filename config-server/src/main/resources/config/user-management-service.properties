server.port=8086

spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/medihub
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/medihub/protocol/openid-connect/certs

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=health,info

keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=medihub
