<div class="page">
  <div class="page-header">
    <button class="btn-back" routerLink="/medicaments">←  Retour</button>
    <h1>{{ isEditing ? '✏️ Modifier' : '➕ Nouveau' }} Médicament</h1>
  </div>

  <div class="form-card">
    <div class="success-banner" *ngIf="success">
      ✅ {{ success }}
    </div>
    <div class="error-banner" *ngIf="error">
      ⚠️ {{ error }}
    </div>

    <form (ngSubmit)="soumettre()" #f="ngForm">

      <div class="form-section">
        <h3>📋 Informations générales</h3>
        <div class="form-grid">
          <div class="form-group full">
            <label>Nom du médicament *</label>
            <input type="text" [(ngModel)]="medicament.nom" name="nom"
              required placeholder="Ex: Paracétamol 500mg" #nom="ngModel"/>
            <span class="field-error" *ngIf="nom.invalid && nom.touched">Le nom est obligatoire</span>
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea [(ngModel)]="medicament.description" name="description"
              rows="3" placeholder="Description du médicament..."></textarea>
          </div>
          <div class="form-group">
            <label>Catégorie</label>
            <select [(ngModel)]="medicament.categorie" name="categorie">
              <option value="">Sélectionner...</option>
              <option>Antalgique</option>
              <option>Antibiotique</option>
              <option>Anti-inflammatoire</option>
              <option>Antihypertenseur</option>
              <option>Antidiabétique</option>
              <option>Vitamine</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label>Fabricant</label>
            <input type="text" [(ngModel)]="medicament.fabricant" name="fabricant"
              placeholder="Ex: Sanofi"/>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>💰 Prix & Stock</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Prix (TND) *</label>
            <input type="number" [(ngModel)]="medicament.prix" name="prix"
              required min="0" step="0.01" placeholder="0.00" #prix="ngModel"/>
            <span class="field-error" *ngIf="prix.invalid && prix.touched">Le prix est obligatoire</span>
          </div>
          <div class="form-group">
            <label>Quantité en stock *</label>
            <input type="number" [(ngModel)]="medicament.quantiteStock" name="quantiteStock"
              required min="0" placeholder="0" #stock="ngModel"/>
            <span class="field-error" *ngIf="stock.invalid && stock.touched">La quantité est obligatoire</span>
          </div>
          <div class="form-group">
            <label>Seuil d'alerte</label>
            <input type="number" [(ngModel)]="medicament.seuilAlerte" name="seuilAlerte"
              min="0" placeholder="10"/>
          </div>
          <div class="form-group">
            <label>Date d'expiration</label>
            <input type="date" [(ngModel)]="medicament.dateExpiration" name="dateExpiration"/>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/medicaments">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="f.invalid || loading">
          <span *ngIf="loading">⏳ Enregistrement...</span>
          <span *ngIf="!loading">{{ isEditing ? '💾 Enregistrer' : '➕ Créer' }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
