<div class="page">
  <div class="page-header">
    <button class="btn-back" routerLink="/rendezvous">← Retour</button>
    <h1>{{ isEditing ? '✏️ Modifier' : '➕ Nouveau' }} Rendez-vous</h1>
  </div>

  <div class="form-card">
    <div class="success-banner" *ngIf="success">✅ {{ success }}</div>
    <div class="error-banner" *ngIf="error">⚠️ {{ error }}</div>

    <form (ngSubmit)="soumettre()" #f="ngForm">
      <div class="form-section">
        <h3>📅 Informations du rendez-vous</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Patient ID *</label>
            <input type="number" [(ngModel)]="rdv.patientId" name="patientId" required #pid="ngModel" />
            <span class="field-error" *ngIf="pid.invalid && pid.touched">Obligatoire</span>
          </div>
          <div class="form-group">
            <label>Médecin ID *</label>
            <input type="number" [(ngModel)]="rdv.medecinId" name="medecinId" required #mid="ngModel" />
            <span class="field-error" *ngIf="mid.invalid && mid.touched">Obligatoire</span>
          </div>
          <div class="form-group">
            <label>Date *</label>
            <input type="date" [(ngModel)]="rdv.dateRendezVous" name="dateRendezVous" required />
          </div>
          <div class="form-group">
            <label>Heure *</label>
            <input type="time" [(ngModel)]="rdv.heureRendezVous" name="heureRendezVous" required />
          </div>
          <div class="form-group">
            <label>Créateur *</label>
            <select [(ngModel)]="rdv.createur" name="createur" required>
              <option value="PATIENT">Patient</option>
              <option value="MEDECIN">Médecin</option>
            </select>
          </div>
          <div class="form-group" *ngIf="isEditing">
            <label>Statut</label>
            <select [(ngModel)]="rdv.statut" name="statut">
              <option value="PLANIFIE">PLANIFIÉ</option>
              <option value="CONFIRME">CONFIRMÉ</option>
              <option value="ANNULE">ANNULÉ</option>
              <option value="TERMINE">TERMINÉ</option>
              <option value="REPORTE">REPORTÉ</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Motif</label>
            <input type="text" [(ngModel)]="rdv.motif" name="motif" placeholder="Ex: Consultation générale" />
          </div>
          <div class="form-group full">
            <label>Notes</label>
            <textarea [(ngModel)]="rdv.notes" name="notes" rows="3" placeholder="Notes complémentaires..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/rendezvous">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="f.invalid || loading">
          {{ loading ? '⏳ Enregistrement...' : (isEditing ? '💾 Enregistrer' : '➕ Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
