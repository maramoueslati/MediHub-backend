<div class="page">
  <div class="page-header">
    <button class="btn-back" routerLink="/dossiers">← Retour</button>
    <h1>{{ isEditing ? '✏️ Modifier' : '➕ Nouveau' }} Dossier Médical</h1>
  </div>

  <div class="form-card">
    <div class="success-banner" *ngIf="success">✅ {{ success }}</div>
    <div class="error-banner" *ngIf="error">⚠️ {{ error }}</div>

    <form (ngSubmit)="soumettre()" #f="ngForm">
      <div class="form-section">
        <h3>👤 Informations patient</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Patient ID *</label>
            <input type="number" [(ngModel)]="dossier.patientId" name="patientId" required #pid="ngModel" />
            <span class="field-error" *ngIf="pid.invalid && pid.touched">Obligatoire</span>
          </div>
          <div class="form-group">
            <label>Médecin ID</label>
            <input type="number" [(ngModel)]="dossier.medecinId" name="medecinId" />
          </div>
          <div class="form-group">
            <label>Groupe Sanguin</label>
            <select [(ngModel)]="dossier.groupeSanguin" name="groupeSanguin">
              <option value="">Sélectionner...</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="form-group">
            <label>Statut</label>
            <select [(ngModel)]="dossier.statut" name="statut">
              <option value="ACTIF">ACTIF</option>
              <option value="ARCHIVE">ARCHIVÉ</option>
              <option value="FERME">FERMÉ</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Allergies</label>
            <textarea [(ngModel)]="dossier.allergies" name="allergies" rows="2" placeholder="Ex: Pénicilline, Aspirine..."></textarea>
          </div>
          <div class="form-group full">
            <label>Antécédents médicaux</label>
            <textarea [(ngModel)]="dossier.antecedents" name="antecedents" rows="3" placeholder="Ex: Diabète type 2, Hypertension..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/dossiers">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="f.invalid || loading">
          {{ loading ? '⏳ Enregistrement...' : (isEditing ? '💾 Enregistrer' : '➕ Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
